<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Jason Robinson's Janus Ensemble, Inc</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="banner-outer">
    <div class="banner-inner">
        <a href="index.html">
            <img src="https://jasonrobinson897.github.io/janusensemble/headerlogo_image.png" alt="Janus Ensemble Logo" class="header-logo">
        </a>

        <nav class="nav-container">
            <button class="menu-toggle" id="mobile-menu-button" aria-label="Toggle Menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-menu" id="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="support.html" class="btn-support">Support</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <div class="content-card">
        <h2>Contact Us</h2>
        <p>Please use the form below to get in touch regarding booking, commissions, or general inquiries.</p>

        <form action="https://formspree.io/f/YOUR_ENDPOINT" method="POST" class="contact-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="_replyto" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="6" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </div>
</main>

<footer>
    <div class="footer-content">
        <img src="https://jasonrobinson897.github.io/janusensemble/footer_image.png" alt="Janus Ensemble Inc" class="footer-logo">
        <p>&copy; <script>document.write(new Date().getFullYear());</script>, Jason Robinson's Janus Ensemble, Inc.</p>
    </div>
</footer>

<script>
    const toggle = document.getElementById('mobile-menu-button');
    const menu = document.getElementById('nav-list');
    if(toggle && menu) {
        toggle.addEventListener('click', () => {
            menu.classList.toggle('active');
        });
    }
</script>

</body>
</html>

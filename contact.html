<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Jason Robinson's Janus Ensemble, Inc</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Specific styles for the form elements since they aren't on the home page */
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .form-group { display: flex; flex-direction: column; }

        label { 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            margin-bottom: 5px; 
            color: var(--navy);
        }

        input, textarea {
            padding: 12px;
            border: 1px solid #ccc;
            font-family: 'Jost', sans-serif;
            background: rgba(255,255,255,0.5);
            border-radius: 4px;
        }

        button[type="submit"] {
            background: var(--navy);
            color: white;
            padding: 15px;
            border: none;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s;
            border-radius: 4px;
            margin-top: 10px;
        }

        button[type="submit"]:hover { background: var(--gold); }
    </style>
</head>
<body>

<header class="banner-container">
    <img src="https://jasonrobinson897.github.io/janusensemble/banner_image.png" alt="Janus Ensemble Banner" class="banner-img">
    <nav class="nav-container">
        <button class="menu-toggle" id="mobile-menu-button" aria-label="Toggle Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-menu" id="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="support.html" class="btn-support">Support</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="content-card">
        <h2>Contact Us</h2>
        <p>Please use the form below to get in touch regarding booking, commissions, or general inquiries.</p>

        <form action="https://formspree.io/f/YOUR_ENDPOINT" method="POST" class="contact-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="_replyto" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="6" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </div>
</main>

<footer>
    <div class="footer-content">
        <img src="https://jasonrobinson897.github.io/janusensemble/footer_image.png" alt="Janus Ensemble Inc" class="footer-logo">
        <p>&copy; <script>document.write(new Date().getFullYear());</script>, Jason Robinson's Janus Ensemble, Inc.</p>
    </div>
</footer>

<script>
    const toggle = document.getElementById('mobile-menu-button');
    const menu = document.getElementById('nav-list');
    if(toggle && menu) {
        toggle.addEventListener('click', () => {
            menu.classList.toggle('active');
        });
    }
</script>

</body>
</html>

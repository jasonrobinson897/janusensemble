<html lang="en">
<head>

    <style>
        * { box-sizing: border-box; }
        
        :root {
            --navy: #002d56;
            --gold: #b5a478;
            --cream: #fdfcf8;
        }

        body { 
            font-family: 'Jost', sans-serif; 
            line-height: 1.6; 
            color: #000000; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 0 0 40px 0;
            min-height: 100vh;
            background: 
                linear-gradient(rgba(255, 252, 248, 0.9), rgba(255, 252, 248, 0.9)),
                url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        /* --- Banner Container --- */
        .banner-container {
            position: relative; 
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            overflow: hidden; 
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block; 
        }

        /* --- Navigation Pinned to Bottom Right --- */
        .nav-container {
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
            margin: 0;
            padding: 15px 25px;
            background: transparent; 
        }

            text-decoration: none;
            color: #000000;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;

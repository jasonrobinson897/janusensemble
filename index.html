        * { box-sizing: border-box; }
        
        :root {
            --navy: #002d56;
            --gold: #b5a478;
            --cream: #fdfcf8;
        }

        body { 
            font-family: 'Jost', sans-serif; 
            line-height: 1.6;

            max-width: 800px; 
            margin: 0 auto; 
            padding: 0 0 40px 0;

                url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        /* --- Banner Container --- */
        .banner-container {
            position: relative; 
            width: 100%;
            max-width: 800px;
            min-height: 200px; 
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            overflow: hidden; 
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block; 
        }

        /* --- Navigation Pinned to Bottom Right --- */
        .nav-container {
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
            margin: 0;
            padding: 15px 25px;
            background: transparent; 
        }

        .nav-menu a {
            text-decoration: none;
            color: #000000;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s ease;
            text-shadow: 1px 1px 5px rgba(255,255,255,0.8);
        }

        .nav-menu a:hover {
            color: var(--gold);
        }

        .btn-support {
            border: 1px solid #000;
            padding: 4px 10px;
        }

        /* --- Content Area --- */
        main { padding: 0 20px; }

        h2 { 
            border-bottom: 1px solid var(--navy); 
            padding-bottom: 10px; 
            margin-top: 40px; 
            text-transform: uppercase; 
            color: var(--navy);
            letter-spacing: 1px;
        }

        ul#release-list { list-style: none; padding: 0; }
        ul#release-list li { padding: 15px 0; border-bottom: 1px solid #eee; }

        /* --- Footer --- */
        footer { margin-top: 80px; padding: 20px; border-top: 1px solid #ddd; }
        .footer-content { display: flex; flex-direction: column; align-items: flex-end; }
        .footer-logo { width: 160px; height: auto; margin-bottom: 15px; }
        .footer-content p { text-align: right; font-size: 0.8rem; text-transform: uppercase; color: #666; }

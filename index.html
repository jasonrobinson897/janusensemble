<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700;800&display=swap" rel="stylesheet">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Robinson's Janus Ensemble, Inc | Official Site</title>
    <style>
        * { box-sizing: border-box; }
        
        :root {
            --navy: #002d56;
            --gold: #b5a478;
            --cream: #fdfcf8;
        }

        body { 
            font-family: 'Jost', sans-serif; 
            line-height: 1.6; 
            color: #000000; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 0 0 40px 0;
            min-height: 100vh;
            background: 
                linear-gradient(rgba(255, 252, 248, 0.9), rgba(255, 252, 248, 0.9)),
                url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        /* --- Banner Container --- */
        .banner-container {
            position: relative; 
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block; 
        }

        /* --- Navigation Desktop (Pinned to Image) --- */
        .nav-container {
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: 10;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
            margin: 0;
            padding: 15px 25px;
            background: transparent; 
        }

        .nav-menu a {
            text-decoration: none;
            color: #000000;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s ease;
            text-shadow: 1px 1px 5px rgba(255,255,255,0.8);
        }

        .nav-menu a:hover { color: var(--gold); }
        .btn-support { border: 1px solid #000; padding: 4px 10px; }

        /* --- Mobile Styles --- */
        .menu-toggle { display: none; }

        @media (max-width: 768px) {
            /* Reset banner for mobile */
            .banner-container { overflow: visible; }
            
            /* Move nav container below image on mobile for stability */
            .nav-container {
                position: relative;
                width: 100%;
                background: rgba(255,255,255,0.7); /* Light wash behind toggle */
                text-align: center;
            }

            .menu-toggle { 
                display: inline-block; 
                background: #000; 
                padding: 10px;
                border: none;
                cursor: pointer;
                margin: 10px auto;
            }
            .menu-toggle span { display: block; width: 22px; height: 2px; background: white; margin: 5px 0; }

            .nav-menu {
                display: none;
                flex-direction: column;
                width: 100%;
                padding: 20px 0;
                gap: 15px;
                align-items: center;
            }
            
            .nav-menu.active { display: flex; }
            .nav-menu li { margin: 5px 0; }
            .nav-menu a { text-shadow: none; } /* Clearer on mobile white bg */
        }

        /* --- Content Area --- */
        main { padding: 0 20px; }
        h2 { 
            border-bottom: 1px solid var(--navy); 
            padding-bottom: 10px; 
            margin-top: 40px; 
            text-transform: uppercase; 
            color: var(--navy);
            letter-spacing: 1px;
        }
